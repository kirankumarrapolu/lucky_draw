<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Name Pairing App</title>\n</head>\n<body>\n    <h1>Name Pairing Application</h1>\n    <form id="nameForm">\n        <input type="text" id="nameInput" placeholder="Enter a name" required/>\n        <button type="button" id="addName">Add Name</button>\n    </form>\n    <h2>Entered Names:</h2>\n    <ul id="nameList"></ul>\n    <button id="shufflePairs">Shuffle and Create Pairs</button>\n    <h2>Generated Pairs:</h2>\n    <ul id="pairList"></ul>\n    <script>\n        const nameForm = document.getElementById('nameForm');\n        const nameInput = document.getElementById('nameInput');\n        const addNameBtn = document.getElementById('addName');\n        const nameList = document.getElementById('nameList');\n        const shufflePairsBtn = document.getElementById('shufflePairs');\n        const pairList = document.getElementById('pairList');\n        let names = [];\n\n        addNameBtn.addEventListener('click', () => {\n            const name = nameInput.value.trim();\n            if (name && !names.includes(name)) {\n                names.push(name);\n                const li = document.createElement('li');\n                li.textContent = name;\n                nameList.appendChild(li);\n                nameInput.value = '';\n            } else {\n                alert('Please enter a unique name.');\n            }\n        });\n\n        shufflePairsBtn.addEventListener('click', () => {\n            if (names.length < 4) {\n                alert('Please enter at least 4 names.');\n                return;\n            }\n            const shuffled = names.sort(() => 0.5 - Math.random());\n            pairList.innerHTML = ''; // Clear previous pairs\n            for (let i = 0; i < shuffled.length; i += 2) {\n                if (i + 1 < shuffled.length) {\n                    const li = document.createElement('li');\n                    li.textContent = shuffled[i] + ' & ' + shuffled[i + 1];\n                    pairList.appendChild(li);\n                }\n            }\n        });\n    <\/script>\n</body>\n</html>
